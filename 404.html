<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Portal de Notícias - Gui Cariolatto</title>
    <script type="text/javascript">
      var segment = 'alendadevivoeguicariolatto';
      var l = window.location;
      if (l.pathname.indexOf('/' + segment) === 0 && l.pathname.length > segment.length + 1) {
        // Se estiver em uma sub-rota, redireciona para a raiz da subpasta
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/' + segment + '/');
      } else {
        // Caso contrário, apenas recarrega o index
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/' + segment + '/');
      }
    </script>
  </head>
  <body>
  </body>
</html>
